spring.application.name=inclusao

# Configurações do datasource Oracle (ajustar conforme ambiente)
spring.datasource.url=jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL
spring.datasource.username=rm561859
spring.datasource.password=589631
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Não deixar o Hibernate criar/trocar o esquema; a criação de tabelas é via Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Habilita o Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Chave secreta utilizada para assinar os tokens JWT. Deve ser longa e difícil de adivinhar.
security.jwt.secret=ChangeThisSecretToAStrongRandomValue1234567890

# As propriedades spring.security.user.* foram removidas porque a autenticação agora utiliza
# um modelo de usuário persistido no banco de dados e tokens JWT.

#Garante que rode apenas 2 processos por vez.
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1