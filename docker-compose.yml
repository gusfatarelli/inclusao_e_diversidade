version: '3.8'

services:
  # Configuração automática do Banco de Dados Oracle XE
  db:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: oracle_db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=senha
      - APP_USER=usuario
      - APP_USER_PASSWORD=senha
    volumes:
      - oracle_data:/opt/oracle/oradata

  # Configuração da aplicação Java do seu grupo
  app:
    build: .
    container_name: inclusao_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@db:1521/XEPDB1
      - SPRING_DATASOURCE_USERNAME=usuario
      - SPRING_DATASOURCE_PASSWORD=senha
    depends_on:
      - db

volumes:
  oracle_data:
